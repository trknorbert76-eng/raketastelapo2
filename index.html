<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rakétás Télapó</title>

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
background:black;
font-family:Georgia;
}

/* háttér */

.bg{
position:fixed;
inset:0;
z-index:1;
}

.bg video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

/* kezelőfelület */

.ui{
position:fixed;
inset:0;
z-index:5;
}

/* gombsor */

.gombsor{

position:absolute;
left:25px;
top:50%;
transform:translateY(-50%);

display:flex;
flex-direction:column;
gap:18px;

padding:15px 12px;
border-radius:18px;

background:rgba(10,20,30,0.25);

box-shadow:
inset 0 1px 0 rgba(255,255,255,0.1),
0 10px 40px rgba(0,0,0,0.5);

}

/* gomb */

.kepgomb{

width:120px;
text-align:center;
cursor:pointer;

padding:10px;

border-radius:18px;

background:linear-gradient(
180deg,
rgba(220,245,255,0.12),
rgba(80,120,150,0.10)
);

border:1px solid rgba(160,220,255,0.25);

transition:0.2s;

}

.kepgomb img{

width:80px;
display:block;
margin:auto;

filter:
drop-shadow(0 0 8px rgba(150,230,255,0.9))
drop-shadow(0 0 16px rgba(120,220,255,0.5));

}

.kepgomb:hover{
transform:translateY(-3px);
}

.gombszoveg{

margin-top:6px;
font-size:13px;

color:#d6f7ff;

text-shadow:
0 0 6px rgba(160,230,255,1),
0 0 12px rgba(120,220,255,0.6);

}

</style>
</head>

<body>

<!-- háttér -->

<div class="bg">

<video id="bgvideo" autoplay muted loop playsinline>

<source src="raketa.mp4" type="video/mp4">

</video>

</div>

<!-- gombok -->

<div class="ui">

<div class="gombsor">

<div class="kepgomb" id="btn1">

<img src="hopihegomb01.png">

<div class="gombszoveg">
Gyermek szívvel<br>
lejátszás
</div>

</div>


<div class="kepgomb" id="btn2">

<img src="hopihegomb01.png">

<div class="gombszoveg">
A mi Télapónk<br>
lejátszás
</div>

</div>


<div class="kepgomb" id="btn3">

<img src="hopihegomb01.png">

<div class="gombszoveg">
Emlék<br>
lejátszás
</div>

</div>

</div>

</div>

<script>

const bg = document.getElementById("bgvideo")

function startVideo(link){

bg.pause()

bg.src="vershatter.mp4"

bg.play()

setTimeout(function(){

window.location.href=link

},2000)

}

document.getElementById("btn1").onclick=function(){

startVideo("https://www.youtube.com/watch?v=P-VyaH8ma-U")

}

document.getElementById("btn2").onclick=function(){

startVideo("https://www.youtube.com/watch?v=X_yYjijwW_8")

}

document.getElementById("btn3").onclick=function(){

startVideo("https://www.youtube.com/watch?v=YIYCAlUlMQ8")

}

</script>

</body>
</html>
