<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rakétás Télapó</title>

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
background:black;
font-family:Georgia;
color:white;
}

.bg{
position:fixed;
inset:0;
z-index:1;
}

.bg video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

.ui{
position:fixed;
inset:0;
z-index:5;
}

/* gombok */

.gombsor{
position:absolute;
left:30px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:18px;
}

.kepgomb{
width:120px;
cursor:pointer;
text-align:center;
padding:8px;
border-radius:16px;
background:rgba(30,40,60,0.35);
backdrop-filter:blur(4px);
transition:0.2s;
}

.kepgomb:hover{
transform:scale(1.05);
}

.kepgomb img{
width:70px;
}

.gombszoveg{
font-size:13px;
margin-top:4px;
color:#d6f7ff;
}

/* videó ablak */

.videoWrap{

position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%) scale(.9);

width:70vw;
max-width:1100px;
aspect-ratio:16/9;

background:black;
border-radius:14px;
overflow:hidden;

opacity:0;
pointer-events:none;

transition:0.3s;
}

.videoWrap.show{
opacity:1;
pointer-events:auto;
transform:translate(-50%,-50%) scale(1);
}

.videoWrap iframe{
width:100%;
height:100%;
border:none;
}

/* bezárás */

.closeBtn{

position:absolute;
right:-12px;
top:-12px;

width:38px;
height:38px;

border-radius:50%;
border:none;

font-size:22px;
cursor:pointer;

background:white;
color:black;

z-index:20;

}

</style>
</head>

<body>

<!-- háttér -->

<div class="bg">
<video autoplay muted loop playsinline>
<source src="raketa.mp4" type="video/mp4">
</video>
</div>

<div class="ui">

<div class="gombsor">

<div class="kepgomb" onclick="playVideo('https://player.cloudinary.com/embed/?cloud_name=dgcumjeuj&public_id=GYSZ_gxtu3x')">
<img src="hopihegomb01.png">
<div class="gombszoveg">Gyermek szívvel<br>lejátszás</div>
</div>

<div class="kepgomb" onclick="playVideo('https://player.cloudinary.com/embed/?cloud_name=dgcumjeuj&public_id=TELAPO_iz7umu')">
<img src="hopihegomb01.png">
<div class="gombszoveg">A mi Télapónk<br>lejátszás</div>
</div>

<div class="kepgomb" onclick="playVideo('https://player.cloudinary.com/embed/?cloud_name=dgcumjeuj&public_id=EMLEK_umqnnr')">
<img src="hopihegomb01.png">
<div class="gombszoveg">Emlék<br>lejátszás</div>
</div>

</div>

<!-- videó popup -->

<div class="videoWrap" id="videoWrap">

<button class="closeBtn" onclick="closeVideo()">×</button>

<iframe id="videoFrame"
allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
allowfullscreen>
</iframe>

</div>

</div>

<script>

const wrap=document.getElementById("videoWrap")
const frame=document.getElementById("videoFrame")

function playVideo(url){

frame.src=url
wrap.classList.add("show")

}

function closeVideo(){

frame.src=""
wrap.classList.remove("show")

}

</script>

</body>
</html>
